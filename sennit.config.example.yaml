# Sennit — example config (npm package: sennit)
version: 1
# Optional: cap length of merged tool descriptions (Unicode code units) for smaller `tools/list` payloads.
# toolsListDescriptionMaxChars: 400
# Optional: forward upstream list_changed hints to the host (merged registrations still fixed until reconnect).
# dynamicToolList: true
# dynamicResourceList: true
# dynamicPromptList: true
# Optional: max concurrent upstream calls per single `sennit.batch_call` request.
# batchCallMaxConcurrency: 8
# Optional: how upstream MCP servers see workspace roots (see root README / src/config/README.md).
# roots:
#   mode: ignore
#   allowUriPrefixes: ["file:///Users/you/projects/acme"]   # required when mode is intersect
#   mapByUpstream:
#     myserver:
#       - { fromPrefix: "file:///host/", toPrefix: "file:///container/" }
servers:
  # docs:
  #   transport: stdio
  #   command: npx
  #   args: ["-y", "@some/mcp-server"]
  #   tools: ["search", "fetch"]   # optional allowlist; omit = all tools
  #   resources: ["file:///mock/readme.md"]   # optional; exact upstream URIs from resources/list
  #   resourceTemplates: ["file:///tpl/{id}"]   # optional; exact uriTemplate from resources/templates/list
  #   prompts: ["greeting"]   # optional; upstream prompt names from prompts/list
  mock:
    transport: stdio
    command: node
    args: ["dist/fixtures/mock-upstream.js"]
